<!DOCTYPE html>
<!--
  Three-signal recession rule panel. SELF-CONTAINED: data embedded below, charts drawn with
  inline SVG, no external libraries. Regenerate with build_two_clock_data.py.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Three-Signal Recession Rule</title>
<style>
  :root{
    --ink:#16213e; --muted:#5b6478; --line:#e3e6ee; --bg:#ffffff; --panel:#f7f8fb;
    --blue:#2563eb; --teal:#0d9488; --grayline:#aab2c5; --band:#dfe3ec;
    --green:#16a34a; --amber:#e08a00; --red:#dc2626;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1040px;margin:0 auto;padding:24px 22px 60px}
  a.back{color:var(--blue);text-decoration:none;font-size:13px}
  h1{font-size:22px;margin:8px 0 2px}
  .sub{color:var(--muted);margin:0 0 4px;font-size:13.5px}
  .headline{border-radius:14px;padding:16px 18px;margin:16px 0 8px;border:1px solid;font-weight:700;font-size:19px}
  .headline small{display:block;font-weight:500;font-size:14px;margin-top:4px}
  .h-clear{background:#eafaf0;border-color:#bfe9cf;color:#10632f}
  .h-fire{background:#fdecec;border-color:#f6bcbc;color:#a01818}
  .cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:14px}
  @media(max-width:760px){.cards{grid-template-columns:1fr}}
  .sig{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px;text-align:center}
  .sig .no{color:var(--muted);font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .sig .nm{font-weight:600;font-size:15px;margin-top:2px}
  .sig .subq{color:var(--muted);font-size:12px;margin-top:1px;min-height:30px}
  .sig .big{font-size:38px;font-weight:700;margin:-4px 0}
  .sig .model{color:var(--muted);font-size:11px;margin-top:2px}
  .sig .gate{font-size:11.5px;margin-top:6px}
  .met-yes{color:var(--red);font-weight:700}
  .met-no{color:var(--green);font-weight:700}
  .badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid;margin-top:6px}
  .b-green{background:#eafaf0;border-color:#bfe9cf;color:#10632f}
  .b-red{background:#fdecec;border-color:#f6bcbc;color:#a01818}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:20px}
  .card h2{font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
  .note{color:var(--muted);font-size:12.5px;margin-top:10px;line-height:1.55}
  .srcline{font-size:12px;color:var(--muted);margin-top:10px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:8px}
  .legend i{display:inline-block;width:20px;height:0;vertical-align:middle;margin-right:5px}
  svg{display:block;width:100%;height:auto}
  text{fill:var(--ink)}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="./">&larr; back to the main dashboard</a>
  <h1>Three-Signal Recession Rule</h1>
  <p class="sub" id="asof"></p>

  <div class="headline" id="headline"></div>
  <p class="note" id="bottomline" style="margin-top:0"></p>

  <div class="cards" id="cards"></div>

  <!-- TERM-PREMIUM HISTORY -->
  <div class="card">
    <h2>Term premium over time — the trust check (signal 3)</h2>
    <svg id="tpChart" viewBox="0 0 1000 380" aria-label="term premium history"></svg>
    <div class="legend">
      <span><i style="border-top:3px solid var(--teal)"></i>term premium (pp, left)</span>
      <span><i style="border-top:3px solid var(--red);opacity:.5"></i>flagship recession probability (%, right)</span>
      <span><i style="border-top:12px solid var(--band);height:0"></i>NBER recession</span>
      <span><i style="border-top:10px solid #fde2e2;height:0"></i>compressed (below 50 bp gate)</span>
    </div>
    <p class="note" id="tpDiag"></p>
  </div>

  <p class="srcline" id="srcline"></p>
  <p class="note" id="caveat"></p>
</div>

<script>
const DATA = __TWO_CLOCK_DATA__;
const lvlColor = p => p < 25 ? "var(--green)" : (p < 50 ? "var(--amber)" : "var(--red)");

/* ---------- header + headline ---------- */
document.getElementById("asof").textContent = "Live daily curve as of " + (DATA.as_of_daily || "n/a") + ".";
(function(){
  const r=DATA.rule, h=document.getElementById("headline");
  h.className = "headline " + (r.firing ? "h-fire" : "h-clear");
  h.innerHTML = "Recession signal: " + (r.firing ? "FIRING" : "NOT firing")
    + "<small>" + r.count_met + " of 3 conditions met — the rule calls a recession only when <b>all three</b> confirm "
    + "(12-month ≥ " + r.thresholds.flag + "%, 3-month ≥ " + r.thresholds.aug + "%, term premium ≥ " + r.thresholds.tp_bp + " bp).</small>";
  const s=DATA.signals;
  const risk = s.filter(x=>x.key!=="tp" && x.met).length;
  document.getElementById("bottomline").innerHTML =
    risk===0
      ? "Both risk gauges are well below their thresholds and the term premium is not compressed, so the curve signal is clean — no recession call today."
      : "At least one risk gauge is elevated — watch the per-signal cards; the rule still requires all three to fire.";
})();

/* ---------- gauge ---------- */
function gauge(p){
  const cx=120, cy=120, r=88, col=lvlColor(p);
  const ang=Math.PI*(1-p/100), pol=a=>[cx+r*Math.cos(a), cy-r*Math.sin(a)];
  const arc=(a0,a1,c)=>{const[x0,y0]=pol(a0),[x1,y1]=pol(a1);const lg=(a0-a1)>Math.PI?1:0;
    return `<path d="M${x0} ${y0} A${r} ${r} 0 ${lg} 1 ${x1} ${y1}" fill="none" stroke="${c}" stroke-width="14" stroke-linecap="round"/>`;};
  const[nx,ny]=pol(ang);
  return `<svg viewBox="0 0 240 132">`+arc(Math.PI,0,"#e7eaf1")+arc(Math.PI,ang,col)
    +`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${col}" stroke-width="3"/>`
    +`<circle cx="${cx}" cy="${cy}" r="5" fill="${col}"/></svg>`;
}

/* ---------- three signal cards ---------- */
(function(){
  const host=document.getElementById("cards");
  host.innerHTML = DATA.signals.map((s,i)=>{
    const metTxt = s.met ? '<span class="met-yes">✓ met</span>' : '<span class="met-no">— not met</span>';
    if(s.gauge){
      return `<div class="sig"><div class="no">Signal ${i+1}</div>
        <div class="nm">${s.name}</div><div class="subq">${s.sub}</div>
        ${gauge(s.value)}
        <div class="big" style="color:${lvlColor(s.value)}">${s.value}%</div>
        <div class="model">${s.model}</div>
        <div class="gate">${s.fires_text} · ${metTxt}</div>
        ${s.source_note?`<div class="model" style="margin-top:4px">${s.source_note}</div>`:""}</div>`;
    }
    // trust-check card (signal 3)
    const tp=DATA.term_premium;
    const badge = tp.tp_class==="compressed" ? "b-red" : "b-green";
    return `<div class="sig"><div class="no">Signal 3</div>
      <div class="nm">${s.name}</div><div class="subq">${s.sub}</div>
      <div class="big" style="color:${tp.tp_class==='compressed'?'var(--red)':'var(--teal)'}">${tp.tp_bp>=0?'+':''}${tp.tp_bp} bp</div>
      <div class="model">${s.model}</div>
      <span class="badge ${badge}">${s.tp_class} · ~${s.percentile}th pctile</span>
      <div class="gate">${s.fires_text} · ${metTxt}</div>
      <div class="model" style="margin-top:4px">${s.acm_note}</div></div>`;
  }).join("");
})();

/* ---------- term-premium history chart ---------- */
(function(){
  const W=1000,H=380,m={t:16,r:44,b:28,l:40}, pw=W-m.l-m.r, ph=H-m.t-m.b;
  const d=DATA.series.dates, N=d.length, tp=DATA.series.term_premium, fp=DATA.series.flagship_prob;
  const idx={}; d.forEach((s,i)=>idx[s]=i);
  const x=i=> m.l+(N<2?0:(i/(N-1))*pw);
  const tpVals=tp.filter(v=>v!==null);
  const tpMin=Math.min(-1,Math.floor(Math.min(...tpVals))), tpMax=Math.max(3,Math.ceil(Math.max(...tpVals)));
  const yL=v=> m.t+(1-(v-tpMin)/(tpMax-tpMin))*ph, yR=v=> m.t+(1-v/100)*ph;
  const gate=DATA.term_premium.gate_pp;
  let s="";
  DATA.recessions.forEach(rc=>{let a=idx[rc.start],b=idx[rc.end];
    if(a===undefined&&b===undefined)return; if(a===undefined)a=0; if(b===undefined)b=N-1;
    s+=`<rect x="${x(a)}" y="${m.t}" width="${Math.max(1,x(b)-x(a))}" height="${ph}" fill="var(--band)"/>`;});
  // compressed stretches: term premium below the 50 bp gate
  let run=null;
  tp.forEach((v,i)=>{const lo=v!==null&&v<gate;
    if(lo&&run===null)run=i;
    if((!lo||i===N-1)&&run!==null){const e=lo?i:i-1;
      s+=`<rect x="${x(run)}" y="${m.t}" width="${Math.max(1,x(e)-x(run))}" height="${ph}" fill="#fde2e2" opacity="0.55"/>`; run=null;}});
  // gate line (50 bp) + zero line
  s+=`<line x1="${m.l}" y1="${yL(gate)}" x2="${W-m.r}" y2="${yL(gate)}" stroke="var(--amber)" stroke-dasharray="5 3"/>`;
  s+=`<text x="${m.l+4}" y="${yL(gate)-4}" font-size="10" fill="var(--amber)">50 bp veto gate</text>`;
  s+=`<line x1="${m.l}" y1="${yL(0)}" x2="${W-m.r}" y2="${yL(0)}" stroke="#c9cfdb" stroke-dasharray="2 3"/>`;
  for(let v=tpMin;v<=tpMax;v++) s+=`<text x="${m.l-6}" y="${yL(v)+4}" text-anchor="end" font-size="10" fill="var(--teal)">${v>0?"+":""}${v}</text>`;
  [0,25,50,75,100].forEach(v=> s+=`<text x="${W-m.r+6}" y="${yR(v)+4}" font-size="10" fill="var(--red)" opacity="0.8">${v}%</text>`);
  let lastDec=null;
  d.forEach((str,i)=>{const yr=+str.slice(0,4);
    if(yr%10===0&&str.slice(5)==="01"&&yr!==lastDec){lastDec=yr;
      s+=`<line x1="${x(i)}" y1="${m.t}" x2="${x(i)}" y2="${m.t+ph}" stroke="var(--line)"/>`;
      s+=`<text x="${x(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--muted)">${yr}</text>`;}});
  const path=(arr,y)=>{let str="",pen=false; arr.forEach((v,i)=>{if(v===null){pen=false;return;}
    str+=(pen?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)+" ";pen=true;}); return str;};
  s+=`<path d="${path(fp,yR)}" fill="none" stroke="var(--red)" stroke-width="1.5" opacity="0.42"/>`;
  s+=`<path d="${path(tp,yL)}" fill="none" stroke="var(--teal)" stroke-width="2.2"/>`;
  const t=DATA.term_premium, lowI=idx[t.tp_2022_23_date];
  if(lowI!==undefined) s+=`<circle cx="${x(lowI)}" cy="${yL(t.tp_2022_23)}" r="4" fill="var(--red)"/>`
    +`<text x="${x(lowI)}" y="${yL(t.tp_2022_23)-8}" text-anchor="middle" font-size="10" fill="var(--red)">2022–23 low (${t.tp_2022_23})</text>`;
  let li=N-1; while(li>0&&tp[li]===null)li--;
  s+=`<circle cx="${x(li)}" cy="${yL(tp[li])}" r="4" fill="var(--teal)"/>`
    +`<text x="${x(li)}" y="${yL(tp[li])-8}" text-anchor="end" font-size="10" fill="var(--teal)">today (${tp[li]>=0?"+":""}${tp[li]})</text>`;
  document.getElementById("tpChart").innerHTML=s;
  document.getElementById("tpDiag").innerHTML =
    "When the term premium falls below the <b>50 bp gate</b> (red zone) a given inversion <b>overstates</b> "
    + "recession odds — the false-alarm signature. You can see it in 2022–23: the flagship probability spiked "
    + "while the term premium was compressed, and no recession followed. Compressed 2020–21 average ~"
    + t.tp_compressed_2020_21 + " pp; 2022–23 low " + t.tp_2022_23 + " pp.";
})();

/* ---------- data source + caveat ---------- */
document.getElementById("srcline").innerHTML = "<b>Data source:</b> " + DATA.data_source
  + ". Turning on Moody's DataBuffet (two keys) upgrades signal 2's Aa leg and the cross-check automatically — no code change.";
document.getElementById("caveat").innerHTML =
  "<b>Honest caveat.</b> The rule's thresholds (30% / 15% / 50 bp) are tuned on history — a clean in-sample "
  + "pattern, not a validated forecast. The <b>probabilities themselves are validated out-of-sample</b> "
  + "(flagship 10Y−3M, OOS AUC ≈ 0.80). Framing: term-premium compression is the lead explanation for 2022–24, "
  + "and a deep inversion can be a false alarm. House prices are excluded by design.";
</script>
</body>
</html>
