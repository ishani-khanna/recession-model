name: refresh-recession-indicator

# Weekly refresh: re-pull FRED, recompute the model, regenerate the report + the
# interactive dashboard, run the tests, and commit the refreshed docs/index.html.
# GitHub Pages serves docs/index.html (Settings -> Pages -> source = main /docs).
on:
  schedule:
    - cron: "0 11 * * 1"      # Mondays 11:00 UTC
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write              # to commit the refreshed docs/index.html

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime .env + dirs (the flat dashboard scripts read .env / write output/)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          printf 'FRED_API_KEY=%s\n' "$FRED_API_KEY" > .env
          mkdir -p data output outputs docs

      - name: Build, model, validate, report (+ regenerate dashboard -> docs/index.html)
        env:
          # Secrets live in the repo settings, never in code. FRED is required;
          # DataBuffet is optional (reconciliation degrades gracefully without it).
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DATABUFFET_ACC_KEY: ${{ secrets.DATABUFFET_ACC_KEY }}
          DATABUFFET_ENC_KEY: ${{ secrets.DATABUFFET_ENC_KEY }}
        run: python -m yield_curve.run all --refresh

      - name: Run tests
        run: pytest -q -m "not integration"

      - name: Commit refreshed dashboard (docs/index.html)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/explore.html docs/.nojekyll
          if git diff --staged --quiet; then
            echo "dashboard unchanged; nothing to commit"
          else
            git commit -m "Weekly refresh: update dashboard (docs/index.html)"
            git push
          fi

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: recession-indicator-outputs
          path: outputs/
