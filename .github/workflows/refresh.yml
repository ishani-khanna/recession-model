name: refresh-recession-indicator

# Weekly refresh: re-pull FRED, recompute the model, regenerate the report + charts,
# run the test suite, and upload the outputs as an artifact.
on:
  schedule:
    - cron: "0 11 * * 1"      # Mondays 11:00 UTC
  workflow_dispatch: {}        # allow manual runs from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build, model, validate, report
        env:
          # Secrets live in the repo settings, never in code. FRED is required;
          # DataBuffet is optional (reconciliation degrades gracefully without it).
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DATABUFFET_ACC_KEY: ${{ secrets.DATABUFFET_ACC_KEY }}
          DATABUFFET_ENC_KEY: ${{ secrets.DATABUFFET_ENC_KEY }}
        run: python -m yield_curve.run all --refresh

      - name: Run tests
        run: pytest -q -m "not integration"

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: recession-indicator-outputs
          path: outputs/
