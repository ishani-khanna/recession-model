name: refresh-recession-indicator

# Weekly refresh: re-pull FRED, recompute the model, regenerate the report + the
# interactive dashboard, run the tests, upload outputs, and publish the dashboard to Pages.
on:
  schedule:
    - cron: "0 11 * * 1"      # Mondays 11:00 UTC
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build, model, validate, report (+ regenerate dashboard)
        env:
          # Secrets live in the repo settings, never in code. FRED is required;
          # DataBuffet is optional (reconciliation degrades gracefully without it).
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DATABUFFET_ACC_KEY: ${{ secrets.DATABUFFET_ACC_KEY }}
          DATABUFFET_ENC_KEY: ${{ secrets.DATABUFFET_ENC_KEY }}
        run: python -m yield_curve.run all --refresh

      - name: Run tests
        run: pytest -q -m "not integration"

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: recession-indicator-outputs
          path: outputs/

      # ---- Publish the interactive dashboard (output/index.html) to GitHub Pages ----
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output      # the self-contained interactive dashboard (index.html)

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
